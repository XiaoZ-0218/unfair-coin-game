<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Unfair Flips</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg: #0f0f12;
            --surface: #1a1a20;
            --surface-hover: #22222a;
            --text: #e8e8ec;
            --text-dim: #888892;
            --accent: #d4a853;
            --accent-dim: #8a7340;
            --danger: #c74b4b;
            --success: #5aa85a;
            --border: #2a2a32;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding-bottom: 8px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text);
        }

        .header .subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
            transition: border-color 0.3s;
        }

        .stat-card.highlight {
            border-color: var(--accent-dim);
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-value.coins {
            color: var(--accent);
        }

        .stat-value.streak {
            color: var(--text);
        }

        /* Coin Area */
        .coin-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            position: relative;
        }

        .probability-tag {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .probability-tag span {
            color: var(--accent);
            font-weight: 600;
        }

        .coin-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .coin {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        /* Four precise animations to handle all state transitions smoothly */
        .coin.flip-hh {
            animation: flipHH 0.6s ease-in-out;
        }
        .coin.flip-ht {
            animation: flipHT 0.6s ease-in-out;
        }
        .coin.flip-th {
            animation: flipTH 0.6s ease-in-out;
        }
        .coin.flip-tt {
            animation: flipTT 0.6s ease-in-out;
        }

        /* Heads -> Heads (5 full spins, land on 0deg) */
        @keyframes flipHH {
            0%   { transform: rotateY(0deg) scale(1); }
            25%  { transform: rotateY(450deg) scale(1.05); }
            50%  { transform: rotateY(900deg) scale(1.1); }
            75%  { transform: rotateY(1350deg) scale(1.05); }
            100% { transform: rotateY(1800deg) scale(1); }
        }

        /* Heads -> Tails (5.5 spins, land on 180deg) */
        @keyframes flipHT {
            0%   { transform: rotateY(0deg) scale(1); }
            25%  { transform: rotateY(495deg) scale(1.05); }
            50%  { transform: rotateY(990deg) scale(1.1); }
            75%  { transform: rotateY(1485deg) scale(1.05); }
            100% { transform: rotateY(1980deg) scale(1); }
        }

        /* Tails -> Heads (5.5 spins, land on 0deg) */
        @keyframes flipTH {
            0%   { transform: rotateY(180deg) scale(1); }
            25%  { transform: rotateY(675deg) scale(1.05); }
            50%  { transform: rotateY(1170deg) scale(1.1); }
            75%  { transform: rotateY(1665deg) scale(1.05); }
            100% { transform: rotateY(2160deg) scale(1); }
        }

        /* Tails -> Tails (5 full spins, land on 180deg) */
        @keyframes flipTT {
            0%   { transform: rotateY(180deg) scale(1); }
            25%  { transform: rotateY(630deg) scale(1.05); }
            50%  { transform: rotateY(1080deg) scale(1.1); }
            75%  { transform: rotateY(1530deg) scale(1.05); }
            100% { transform: rotateY(1980deg) scale(1); }
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 800;
            box-shadow: 
                0 0 0 4px var(--border),
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 2px 8px rgba(255,255,255,0.05);
        }

        .coin-heads {
            background: linear-gradient(145deg, #2a2a32, #1a1a20);
            color: var(--accent);
            border: 3px solid var(--accent-dim);
        }

        .coin-tails {
            background: linear-gradient(145deg, #2a2a32, #1a1a20);
            color: var(--text-dim);
            border: 3px solid var(--border);
            transform: rotateY(180deg);
        }

        .coin-wrapper:active .coin:not(.flip-hh):not(.flip-ht):not(.flip-th):not(.flip-tt) {
            transform: scale(0.95);
        }

        .flip-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* Streak Mini */
        .streak-mini {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            margin-top: -10px;
        }

        .streak-mini span {
            color: var(--accent);
            font-weight: 700;
        }

        /* Result Message */
        .result-message {
            text-align: center;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
        }

        .result-message.heads {
            color: var(--accent);
        }

        .result-message.tails {
            color: var(--danger);
        }

        .result-message.win {
            color: var(--success);
            font-size: 1.2rem;
        }

        /* Streak Bar */
        .streak-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
        }

        .streak-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .streak-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
        }

        .streak-target {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .streak-target span {
            color: var(--accent);
            font-weight: 700;
        }

        .streak-track {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .streak-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        .streak-dot.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(212, 168, 83, 0.3);
        }

        .streak-dot.current {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 168, 83, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(212, 168, 83, 0); }
        }

        /* Upgrades */
        .upgrades-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            padding: 0 4px;
        }

        .upgrade-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
        }

        .upgrade-card:active {
            transform: scale(0.98);
        }

        .upgrade-card.disabled {
            opacity: 0.45;
        }

        .upgrade-card:not(.disabled) {
            cursor: pointer;
        }

        .upgrade-card:not(.disabled):hover {
            border-color: var(--accent-dim);
            background: var(--surface-hover);
        }

        .upgrade-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .upgrade-info {
            flex: 1;
            min-width: 0;
        }

        .upgrade-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .upgrade-desc {
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .upgrade-cost {
            text-align: right;
            flex-shrink: 0;
        }

        .upgrade-price {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent);
        }

        .upgrade-level {
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        /* Total Flips */
        .footer-stats {
            text-align: center;
            padding-top: 8px;
        }

        .total-flips {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        /* Floating Text */
        .float-text {
            position: absolute;
            font-weight: 700;
            font-size: 1.1rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 100;
        }

        .float-text.heads {
            color: var(--accent);
        }

        .float-text.tails {
            color: var(--danger);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
        }

        /* Coin Edge Line */
        .coin-edge-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 0;
            transform: translate(-50%, -50%);
            background: var(--accent);
            border-radius: 2px;
            box-shadow: 0 0 16px rgba(212, 168, 83, 0.8), 0 0 40px rgba(212, 168, 83, 0.3);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 5;
        }

        .coin-edge-line.show {
            height: 70%;
            opacity: 1;
        }

        .coin.edge-glow {
            animation: edgeGlow 1.5s ease-in-out infinite;
        }

        @keyframes edgeGlow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(212, 168, 83, 0.4)); }
            50% { filter: drop-shadow(0 0 24px rgba(212, 168, 83, 0.9)); }
        }

        .result-message.edge {
            color: var(--success);
        }

        /* Distribution Stats */
        .dist-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .dist-bar {
            display: flex;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }

        .dist-segment {
            height: 100%;
            transition: width 0.4s ease;
        }

        .dist-segment.heads { background: var(--accent); }
        .dist-segment.tails { background: var(--danger); }
        .dist-segment.edge { background: var(--success); }

        .dist-legend {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 8px;
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .dist-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dist-legend .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        /* Reset Button */
        .reset-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            cursor: pointer;
            margin: 0 auto;
            display: block;
            transition: all 0.2s;
        }

        .reset-btn:active {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Responsive */
        @media (max-width: 360px) {
            .game-container {
                padding: 16px 14px;
                gap: 14px;
            }
            .coin-wrapper {
                width: 140px;
                height: 140px;
            }
            .streak-dot {
                width: 20px;
                height: 20px;
            }
        }

        /* Screen shake */
        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Win overlay */
        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 18, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
            padding: 40px;
            text-align: center;
        }

        .win-overlay.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .win-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--success);
        }

        .win-subtitle {
            font-size: 1rem;
            color: var(--text-dim);
            max-width: 300px;
            line-height: 1.6;
        }

        .win-stats {
            font-size: 0.85rem;
            color: var(--text);
            background: var(--surface);
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .win-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        .win-btn:active {
            transform: scale(0.95);
        }

        /* Admin Panel */
        .admin-trigger-hint {
            position: fixed;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: transparent;
            cursor: default;
            z-index: 50;
        }

        .admin-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .admin-overlay.show {
            display: flex;
        }

        .admin-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .admin-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .admin-close {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-close:active {
            border-color: var(--danger);
            color: var(--danger);
        }

        .admin-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .admin-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
        }

        .admin-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-row label {
            font-size: 0.8rem;
            color: var(--text);
            min-width: 90px;
            flex-shrink: 0;
        }

        .admin-row input[type="number"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            -webkit-appearance: none;
        }

        .admin-row input[type="number"]:focus {
            border-color: var(--accent-dim);
        }

        .admin-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--bg);
            border-radius: 2px;
            outline: none;
        }

        .admin-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .admin-value {
            font-size: 0.8rem;
            color: var(--accent);
            min-width: 50px;
            text-align: right;
            font-weight: 600;
        }

        .admin-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding-top: 8px;
        }

        .admin-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .admin-btn:active {
            transform: scale(0.97);
        }

        .admin-btn.primary {
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        .admin-btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .admin-btn.full {
            grid-column: 1 / -1;
        }

        .admin-textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            color: var(--text);
            font-size: 0.7rem;
            font-family: monospace;
            resize: vertical;
            min-height: 60px;
            outline: none;
        }

        .admin-textarea:focus {
            border-color: var(--accent-dim);
        }

        /* Password Modal */
        .pwd-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2001;
            padding: 20px;
        }

        .pwd-overlay.show {
            display: flex;
        }

        .pwd-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 300px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        .pwd-box h3 {
            font-size: 1rem;
            margin-bottom: 16px;
            color: var(--text);
        }

        .pwd-box input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            color: var(--text);
            font-size: 1rem;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            margin-bottom: 12px;
        }

        .pwd-box input:focus {
            border-color: var(--accent-dim);
        }

        .pwd-box .pwd-error {
            color: var(--danger);
            font-size: 0.75rem;
            min-height: 20px;
            margin-bottom: 8px;
        }

        .pwd-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .pwd-submit {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }

        .pwd-submit:active {
            transform: scale(0.97);
        }

        .pwd-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .pwd-cancel:active {
            border-color: var(--danger);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>UNFAIR FLIPS</h1>
            <div class="subtitle">连续10次正面才能获胜</div>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">金币</div>
                <div class="stat-value coins" id="coinDisplay">0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最佳连击</div>
                <div class="stat-value streak" id="bestStreakDisplay">0</div>
            </div>
        </div>

    <div class="admin-overlay" id="adminOverlay">

                <div class="admin-section-title">升级配置</div>
                <div class="admin-row">

                    <input type="number" id="adminProbLevel" step="1" min="0" max="50">
                </div>
                <div class="admin-row">
                    <label>价值等级</label>
                    <input type="number" id="adminValueLevel" step="1" min="0" max="100">
                </div>
                <div class="admin-row">
                    <label>倍率等级</label>
                    <input type="number" id="adminMultLevel" step="1" min="0" max="50">
                </div>

            <div class="admin-section">
                <div class="admin-section-title">存档操作</div>
                <textarea class="admin-textarea" id="adminExport" readonly placeholder="导出数据..."></textarea>
                <textarea class="admin-textarea" id="adminImport" placeholder="粘贴存档数据导入..."></textarea>
                <div class="admin-btns">
                    <button class="admin-btn primary" id="adminExportBtn">📋 导出</button>
                    <button class="admin-btn primary" id="adminImportBtn">📥 导入</button>
                    <button class="admin-btn danger full" id="adminResetBtn">🗑️ 重置所有数据</button>
                </div>
            </div>

            <div class="admin-section">
                <div class="admin-btns">
                    <button class="admin-btn primary full" id="adminApplyBtn">✅ 应用修改</button>
                </div>
            </div>

            <div class="admin-section">
                <button class="admin-btn full" id="adminBackBtn" style="border-color:var(--border);color:var(--text-dim);">← 返回游戏</button>
            </div>
        </div>
    </div>

    <script>
        // Game State
        const TARGET_STREAK = 10;
        const SAVE_KEY = 'unfairFlips_save';

        let game = {
            coins: 0,
            streak: 0,
            bestStreak: 0,
            totalFlips: 0,
            totalHeads: 0,
            totalEdges: 0,
            probLevel: 0,
            valueLevel: 0,
            multLevel: 0,
            isFlipping: false
        };

        // Upgrade Config
        const upgrades = {
            prob: {
                baseCost: 1,
                costMult: 1.45,
                effect: 0.02,
                maxLevel: 20
            },
            value: {
                baseCost: 0.5,
                costMult: 1.35,
                effect: 0.01,
                maxLevel: 50
            },
            mult: {
                baseCost: 2,
                costMult: 1.6,
                effect: 0.1,
                maxLevel: 20
            }
        };

        // Computed Stats
        function getProb() {
            if (game._adminProb !== undefined) return game._adminProb;
            return Math.min(0.20 + game.probLevel * upgrades.prob.effect, 0.75);
        }

        function getValue() {
            if (game._adminValue !== undefined) return game._adminValue;
            return 0.01 + game.valueLevel * upgrades.value.effect;
        }

        function getMult() {
            if (game._adminMult !== undefined) return game._adminMult;
            return 1 + game.multLevel * upgrades.mult.effect;
        }

        function getTargetStreak() {
            if (game._adminTarget !== undefined) return game._adminTarget;
            return TARGET_STREAK;
        }

        function getCost(type) {
            const u = upgrades[type];
            const level = game[type + 'Level'];
            return u.baseCost * Math.pow(u.costMult, level);
        }

        // Save / Load
        function saveGame() {
            localStorage.setItem(SAVE_KEY, JSON.stringify(game));
        }

        function loadGame() {
            const saved = localStorage.getItem(SAVE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.assign(game, data);
                    // Ensure we never get stuck in a flipping state on reload
                    game.isFlipping = false;
                } catch(e) {}
            }
        }

        // UI Updates
        function formatMoney(n) {
            return '$' + n.toFixed(2);
        }

        function formatPercent(n) {
            return Math.round(n * 100) + '%';
        }

        function updateUI() {
            document.getElementById('coinDisplay').textContent = formatMoney(game.coins);
            document.getElementById('bestStreakDisplay').textContent = game.bestStreak;
            document.getElementById('streakDisplayMini').textContent = '连击: ' + game.streak;
            document.getElementById('probDisplay').textContent = formatPercent(getProb());
            document.getElementById('totalFlips').textContent = game.totalFlips;

            // Update upgrade cards
            ['prob', 'value', 'mult'].forEach(type => {
                const cost = getCost(type);
                const level = game[type + 'Level'];
                const u = upgrades[type];
                const canAfford = game.coins >= cost;
                const maxed = level >= u.maxLevel;

                const card = document.getElementById('upgrade' + type.charAt(0).toUpperCase() + type.slice(1));
                const costEl = document.getElementById('cost' + type.charAt(0).toUpperCase() + type.slice(1));
                const levelEl = document.getElementById('level' + type.charAt(0).toUpperCase() + type.slice(1));

                costEl.textContent = maxed ? 'MAX' : formatMoney(cost);
                levelEl.textContent = 'Lv.' + level;

                card.classList.toggle('disabled', maxed || !canAfford);
            });

            // Update streak dots
            renderStreakDots();

            // Update distribution stats
            renderDistribution();
        }

        function renderStreakDots() {
            const track = document.getElementById('streakTrack');
            track.innerHTML = '';
            const target = getTargetStreak();
            for (let i = 0; i < target; i++) {
                const dot = document.createElement('div');
                dot.className = 'streak-dot';
                if (i < game.streak) {
                    dot.classList.add('active');
                }
                if (i === game.streak && game.streak < target) {
                    dot.classList.add('current');
                }
                track.appendChild(dot);
            }
        }

        function renderDistribution() {
            const total = game.totalFlips;
            const section = document.getElementById('distSection');
            if (total === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';

            const heads = game.totalHeads;
            const edges = game.totalEdges || 0;
            const tails = total - heads - edges;

            const headsPct = ((heads / total) * 100).toFixed(1);
            const tailsPct = ((tails / total) * 100).toFixed(1);
            const edgesPct = ((edges / total) * 100).toFixed(1);

            const bar = document.getElementById('distBar');
            bar.innerHTML = `
                <div class="dist-segment heads" style="width:${headsPct}%"></div>
                <div class="dist-segment tails" style="width:${tailsPct}%"></div>
                <div class="dist-segment edge" style="width:${edgesPct}%"></div>
            `;

            const legend = document.getElementById('distLegend');
            legend.innerHTML = `
                <span><span class="dot" style="background:var(--accent)"></span>正面 ${heads} (${headsPct}%)</span>
                <span><span class="dot" style="background:var(--danger)"></span>反面 ${tails} (${tailsPct}%)</span>
                ${edges > 0 ? `<span><span class="dot" style="background:var(--success)"></span>立起 ${edges} (${edgesPct}%)</span>` : ''}
            `;
        }

        // Floating Text
        function showFloatText(text, isHeads, x, y) {
            const el = document.createElement('div');
            el.className = 'float-text ' + (isHeads ? 'heads' : 'tails');
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // Coin Flip Logic
        function flipCoin() {
            if (game.isFlipping) return;
            game.isFlipping = true;

            const coin = document.getElementById('coin');
            const resultMsg = document.getElementById('resultMsg');
            const coinArea = document.getElementById('coinArea');
            const wrapper = document.getElementById('coinWrapper');

            resultMsg.textContent = '';
            resultMsg.className = 'result-message';
            coinArea.classList.remove('shake');

            // Determine result before animation
            const EDGE_CHANCE = 0.005;
            const roll = Math.random();
            let resultType;
            if (roll < EDGE_CHANCE) {
                resultType = 'edge';
            } else if (roll < EDGE_CHANCE + getProb() * (1 - EDGE_CHANCE)) {
                resultType = 'heads';
            } else {
                resultType = 'tails';
            }

            // Pick the right animation class based on current state -> target state
            const currentRot = coin.style.transform || '';
            const isCurrentlyTails = currentRot.includes('180');
            // For edge, randomly pick heads or tails animation for visual variety
            const isHeadsAnim = resultType === 'heads' || (resultType === 'edge' && Math.random() < 0.5);
            const animClass = isCurrentlyTails
                ? (isHeadsAnim ? 'flip-th' : 'flip-tt')
                : (isHeadsAnim ? 'flip-hh' : 'flip-ht');
            
            coin.classList.add(animClass);

            setTimeout(() => {
                coin.classList.remove('flip-hh', 'flip-ht', 'flip-th', 'flip-tt');
                game.totalFlips++;

                const rect = wrapper.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                // Hide edge visual from previous flip
                document.getElementById('coinEdge').classList.remove('show');
                coin.classList.remove('edge-glow');

                if (resultType === 'edge') {
                    // Edge - coin stands on its side
                    const endRot = isHeadsAnim ? 'rotateY(0deg)' : 'rotateY(180deg)';
                    coin.style.transform = endRot;
                    game.streak = 0;
                    game.totalEdges++;

                    setTimeout(() => {
                        document.getElementById('coinEdge').classList.add('show');
                        coin.classList.add('edge-glow');
                    }, 50);

                    resultMsg.textContent = '🪙 硬币立起来了！连击重置';
                    resultMsg.className = 'result-message edge';
                    coinArea.classList.add('shake');
                    showFloatText('立起!', false, centerX - 20, centerY - 40);
                } else if (resultType === 'heads') {
                    // Heads
                    coin.style.transform = 'rotateY(0deg)';
                    game.streak++;
                    game.totalHeads++;

                    const baseValue = getValue();
                    const mult = getMult();
                    const streakBonus = 1 + (game.streak - 1) * 0.1;
                    const earned = baseValue * mult * streakBonus;
                    game.coins += earned;

                    if (game.streak > game.bestStreak) {
                        game.bestStreak = game.streak;
                    }

                    resultMsg.textContent = `正面! +${formatMoney(earned)}`;
                    resultMsg.className = 'result-message heads';
                    showFloatText('+' + formatMoney(earned), true, centerX - 20, centerY - 40);

                    // Check win
                    if (game.streak >= getTargetStreak()) {
                        setTimeout(() => showWin(), 400);
                    }
                } else {
                    // Tails
                    coin.style.transform = 'rotateY(180deg)';
                    
                    game.streak = 0;

                    resultMsg.textContent = '反面... 连击重置';
                    resultMsg.className = 'result-message tails';
                    coinArea.classList.add('shake');
                    showFloatText('连击重置', false, centerX - 30, centerY - 40);
                }

                game.isFlipping = false;
                updateUI();
                saveGame();
            }, 600);
        }

        // Buy Upgrade
        function buyUpgrade(type) {
            const cost = getCost(type);
            const level = game[type + 'Level'];
            const u = upgrades[type];

            if (game.coins < cost || level >= u.maxLevel) return;

            game.coins -= cost;
            game[type + 'Level']++;
            updateUI();
            saveGame();

            // Visual feedback
            const card = document.getElementById('upgrade' + type.charAt(0).toUpperCase() + type.slice(1));
            card.style.borderColor = 'var(--accent)';
            setTimeout(() => {
                card.style.borderColor = '';
            }, 300);
        }

        // Win
        function showWin() {
            const overlay = document.getElementById('winOverlay');
            const stats = document.getElementById('winStats');
            stats.innerHTML = `
                总抛掷: ${game.totalFlips} 次<br>
                总正面: ${game.totalHeads} 次<br>
                总立起: ${game.totalEdges || 0} 次<br>
                当前金币: ${formatMoney(game.coins)}
            `;
            overlay.classList.add('show');
        }

        function continueGame() {
            document.getElementById('winOverlay').classList.remove('show');
            game.streak = 0;
            // Give a bonus
            game.coins += 5;
            updateUI();
            saveGame();
        }

        // Reset
        function resetGame() {
            if (!confirm('确定要重置所有进度吗？此操作不可恢复。')) return;
            game = {
                coins: 0,
                streak: 0,
                bestStreak: 0,
                totalFlips: 0,
                totalHeads: 0,
                totalEdges: 0,
                probLevel: 0,
                valueLevel: 0,
                multLevel: 0,
                isFlipping: false
            };
            localStorage.removeItem(SAVE_KEY);
            updateUI();
        }

        // Event Listeners
        document.getElementById('coinWrapper').addEventListener('click', flipCoin);

        // Upgrade click handlers
        document.getElementById('upgradeProb').addEventListener('click', () => buyUpgrade('prob'));
        document.getElementById('upgradeValue').addEventListener('click', () => buyUpgrade('value'));
        document.getElementById('upgradeMult').addEventListener('click', () => buyUpgrade('mult'));

        // Reset and continue buttons
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('continueBtn').addEventListener('click', continueGame);

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                flipCoin();
            }
        });

        // Prevent double-tap zoom on mobile - only on coin wrapper
        let lastTouchEnd = 0;
        document.getElementById('coinWrapper').addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // ==================== ADMIN PANEL ====================
        const ADMIN_PASSWORD = 'unfair';
        let adminClickCount = 0;
        let adminClickTimer = null;

        // Trigger: rapid clicks on header title
        document.querySelector('.header h1').addEventListener('click', () => {
            adminClickCount++;
            if (adminClickCount >= 5) {
                adminClickCount = 0;
                showPasswordModal();
            }
            clearTimeout(adminClickTimer);
            adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 800);
        });

        function showPasswordModal() {
            document.getElementById('pwdOverlay').classList.add('show');
            document.getElementById('pwdInput').value = '';
            document.getElementById('pwdError').textContent = '';
            document.getElementById('pwdInput').focus();
        }

        function hidePasswordModal() {
            document.getElementById('pwdOverlay').classList.remove('show');
        }

        function showAdminPanel() {
            hidePasswordModal();
            syncAdminUI();
            document.getElementById('adminOverlay').classList.add('show');
        }

        function hideAdminPanel() {
            document.getElementById('adminOverlay').classList.remove('show');
        }

        function syncAdminUI() {
            document.getElementById('adminCoins').value = game.coins.toFixed(2);
            document.getElementById('adminStreak').value = game.streak;
            document.getElementById('adminBestStreak').value = game.bestStreak;
            document.getElementById('adminTotalFlips').value = game.totalFlips;
            document.getElementById('adminTotalHeads').value = game.totalHeads;
            document.getElementById('adminTotalEdges').value = game.totalEdges || 0;

            const probPct = Math.round(getProb() * 100);
            document.getElementById('adminProb').value = probPct;
            document.getElementById('adminProbVal').textContent = probPct + '%';

            document.getElementById('adminValue').value = getValue().toFixed(3);
            document.getElementById('adminMult').value = getMult().toFixed(1);
            document.getElementById('adminTarget').value = getTargetStreak();

            document.getElementById('adminProbLevel').value = game.probLevel;
            document.getElementById('adminValueLevel').value = game.valueLevel;
            document.getElementById('adminMultLevel').value = game.multLevel;

            document.getElementById('adminExport').value = '';
            document.getElementById('adminImport').value = '';
        }

        document.getElementById('pwdSubmit').addEventListener('click', () => {
            const input = document.getElementById('pwdInput').value;
            if (input === ADMIN_PASSWORD) {
                showAdminPanel();
            } else {
                document.getElementById('pwdError').textContent = '密码错误';
                document.getElementById('pwdInput').value = '';
            }
        });

        document.getElementById('pwdInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('pwdSubmit').click();
        });

        document.getElementById('adminClose').addEventListener('click', hideAdminPanel);

        // Probability slider live update
        document.getElementById('adminProb').addEventListener('input', (e) => {
            document.getElementById('adminProbVal').textContent = e.target.value + '%';
        });

        // Export save
        document.getElementById('adminExportBtn').addEventListener('click', () => {
            const data = JSON.stringify(game, null, 2);
            document.getElementById('adminExport').value = data;
            document.getElementById('adminExport').select();
            try {
                document.execCommand('copy');
                document.getElementById('adminExportBtn').textContent = '✅ 已复制';
                setTimeout(() => document.getElementById('adminExportBtn').textContent = '📋 导出', 1500);
            } catch(e) {}
        });

        // Import save
        document.getElementById('adminImportBtn').addEventListener('click', () => {
            const raw = document.getElementById('adminImport').value.trim();
            if (!raw) return;
            try {
                const data = JSON.parse(raw);
                if (typeof data.coins === 'number') game.coins = data.coins;
                if (typeof data.streak === 'number') game.streak = data.streak;
                if (typeof data.bestStreak === 'number') game.bestStreak = data.bestStreak;
                if (typeof data.totalFlips === 'number') game.totalFlips = data.totalFlips;
                if (typeof data.totalHeads === 'number') game.totalHeads = data.totalHeads;
                if (typeof data.probLevel === 'number') game.probLevel = data.probLevel;
                if (typeof data.valueLevel === 'number') game.valueLevel = data.valueLevel;
                if (typeof data.multLevel === 'number') game.multLevel = data.multLevel;
                game.isFlipping = false;
                saveGame();
                updateUI();
                syncAdminUI();
                document.getElementById('adminImportBtn').textContent = '✅ 导入成功';
                setTimeout(() => document.getElementById('adminImportBtn').textContent = '📥 导入', 1500);
            } catch(e) {
                alert('存档格式错误，无法导入');
            }
        });

        // Reset all data
        document.getElementById('adminResetBtn').addEventListener('click', () => {
            if (!confirm('确定要重置所有数据吗？')) return;
            game = {
                coins: 0,
                streak: 0,
                bestStreak: 0,
                totalFlips: 0,
                totalHeads: 0,
                probLevel: 0,
                valueLevel: 0,
                multLevel: 0,
                isFlipping: false
            };
            localStorage.removeItem(SAVE_KEY);
            updateUI();
            syncAdminUI();
        });

        // Apply changes
        document.getElementById('adminApplyBtn').addEventListener('click', () => {
            const coins = parseFloat(document.getElementById('adminCoins').value);
            const streak = parseInt(document.getElementById('adminStreak').value);
            const bestStreak = parseInt(document.getElementById('adminBestStreak').value);
            const totalFlips = parseInt(document.getElementById('adminTotalFlips').value);
            const totalHeads = parseInt(document.getElementById('adminTotalHeads').value);
            const totalEdges = parseInt(document.getElementById('adminTotalEdges').value);
            const probPct = parseInt(document.getElementById('adminProb').value);
            const value = parseFloat(document.getElementById('adminValue').value);
            const mult = parseFloat(document.getElementById('adminMult').value);
            const target = parseInt(document.getElementById('adminTarget').value);
            const probLevel = parseInt(document.getElementById('adminProbLevel').value);
            const valueLevel = parseInt(document.getElementById('adminValueLevel').value);
            const multLevel = parseInt(document.getElementById('adminMultLevel').value);

            // Apply player stats
            if (!isNaN(coins) && coins >= 0) game.coins = coins;
            if (!isNaN(streak) && streak >= 0) game.streak = streak;
            if (!isNaN(bestStreak) && bestStreak >= 0) game.bestStreak = bestStreak;
            if (!isNaN(totalFlips) && totalFlips >= 0) game.totalFlips = totalFlips;
            if (!isNaN(totalHeads) && totalHeads >= 0) game.totalHeads = totalHeads;
            if (!isNaN(totalEdges) && totalEdges >= 0) game.totalEdges = totalEdges;

            // Apply core params (stored in game object for persistence)
            if (!isNaN(probPct) && probPct >= 0 && probPct <= 100) {
                game._adminProb = probPct / 100;
            }
            if (!isNaN(value) && value > 0) {
                game._adminValue = value;
            }
            if (!isNaN(mult) && mult >= 1) {
                game._adminMult = mult;
            }
            if (!isNaN(target) && target >= 1 && target <= 100) {
                game._adminTarget = target;
            }

            // Apply upgrade levels
            if (!isNaN(probLevel) && probLevel >= 0) game.probLevel = probLevel;
            if (!isNaN(valueLevel) && valueLevel >= 0) game.valueLevel = valueLevel;
            if (!isNaN(multLevel) && multLevel >= 0) game.multLevel = multLevel;

            game.isFlipping = false;
            saveGame();
            updateUI();
            syncAdminUI();

            document.getElementById('adminApplyBtn').textContent = '✅ 已应用';
            setTimeout(() => document.getElementById('adminApplyBtn').textContent = '✅ 应用修改', 1500);
        });

        // Admin back button
        document.getElementById('adminBackBtn').addEventListener('click', hideAdminPanel);

        // Password cancel button
        document.getElementById('pwdCancel').addEventListener('click', hidePasswordModal);

        // Close admin on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideAdminPanel();
                hidePasswordModal();
            }
        });

        // Init
        loadGame();
        updateUI();
    </script>
</body>
</html>
